name: Compilar APK Nativo en GitHub
on:
  push:
    branches: [ master, main ]
jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_MILLA_API_URL: ${{ secrets.EXPO_PUBLIC_MILLA_API_URL || vars.EXPO_PUBLIC_MILLA_API_URL }}
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: 🏗 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Verificar Tipos (TypeScript)
        run: node --stack-size=10000 ./node_modules/typescript/bin/tsc --noEmit --skipLibCheck

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Generar Directorio Nativo de Android
        run: npx expo prebuild --platform android --no-install

      - name: 🔑 Otorgar permisos de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: ⚙️ Compilar APK de Producción con Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 📦 Subir APK como Artefacto de GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Milla-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
