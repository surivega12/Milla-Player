name: Milla CI & Automated Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    name: Verify Types & Package Web Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify TypeScript Compilation (Strict Type-Check)
        run: node --stack-size=10000 ./node_modules/typescript/bin/tsc --noEmit --skipLibCheck

      - name: Build Web Production Bundle
        run: npx expo export -p web --output-dir dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: milla-web-bundle
          path: dist/
          retention-days: 7
